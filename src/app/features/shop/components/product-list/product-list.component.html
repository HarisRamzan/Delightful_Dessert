<div class="container shop-container">
  <h1 class="page-title">Shop Our Delicious Desserts</h1>

  <!-- Filters -->
  <mat-card class="filters-card">
    <div class="filters">
      <mat-form-field appearance="outline">
        <mat-label>Search</mat-label>
        <input matInput [(ngModel)]="searchQuery" (keyup.enter)="onSearch()" placeholder="Search products...">
        <mat-icon matPrefix>search</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Category</mat-label>
        <mat-select [(ngModel)]="selectedCategory" (selectionChange)="onCategoryChange()">
          <mat-option value="">All Categories</mat-option>
          <mat-option *ngFor="let category of categories" [value]="category.id">
            {{category.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" *ngIf="(selectedCategoryData?.subcategories?.length ?? 0) > 0">
        <mat-label>Subcategory</mat-label>
        <mat-select [(ngModel)]="selectedSubcategory" (selectionChange)="onSubcategoryChange()">
          <mat-option value="">All Subcategories</mat-option>
          <mat-option *ngFor="let sub of selectedCategoryData?.subcategories" [value]="sub.id">
            {{sub.name}}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <button mat-raised-button color="primary" (click)="onSearch()">
        <mat-icon>search</mat-icon>
        Search
      </button>

      <button mat-button (click)="clearFilters()">
        <mat-icon>clear</mat-icon>
        Clear Filters
      </button>
    </div>

    <div class="results-info">
      <p>Showing {{products?.length || 0}} of {{totalCount}} products</p>
    </div>
  </mat-card>

  <!-- Products Grid -->
  <div *ngIf="loading" class="loading-spinner">
    <mat-spinner></mat-spinner>
    <p>Loading products...</p>
  </div>

  <div *ngIf="!loading && (!products || products.length === 0)" class="no-products">
    <mat-icon>shopping_basket</mat-icon>
    <h2>No products found</h2>
    <p>Try adjusting your filters or search query</p>
  </div>

  <div *ngIf="!loading && products && products.length > 0" class="products-grid">
    <app-product-card 
      *ngFor="let product of products" 
      [product]="product"
      (addToCart)="onAddToCart($event)">
    </app-product-card>
  </div>

  <!-- Pagination -->
  <mat-paginator 
    *ngIf="!loading && totalPages > 1"
    [length]="totalCount"
    [pageSize]="pageSize"
    [pageIndex]="pageNumber - 1"
    (page)="onPageChange($event.pageIndex + 1)"
    class="paginator">
  </mat-paginator>
</div>
